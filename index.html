<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ibadan Property Platform</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            margin: 0;
        }
        header {
            background: #0d6efd;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #0b5ed7;
        }
        #details {
            display: none;
        }
        #success {
            display: none;
            background: #d1e7dd;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <h2>Ibadan Property Inspection Platform</h2>
</header>

<div class="container">

    <div id="listings">
        <h3>Available Properties</h3>

        <div class="card">
            <h4>2 Bedroom Apartment - Bodija</h4>
            <p>₦800,000/year</p>
            <button onclick="viewDetails('Bodija Apartment')">View Details</button>
        </div>

        <div class="card">
            <h4>Self Contain - Akobo</h4>
            <p>₦300,000/year</p>
            <button onclick="viewDetails('Akobo Self Contain')">View Details</button>
        </div>

    </div>

    <div id="details">
        <h3 id="propertyTitle"></h3>
        <p>Well-furnished property with good road and security.</p>

        <button onclick="book()">Request Inspection</button>

        <div id="success">
            ✅ Inspection request submitted successfully!
        </div>

        <br><br>
        <button onclick="goBack()">← Back</button>
    </div>

</div>

<script>
    function viewDetails(name) {
        document.getElementById('listings').style.display = 'none';
        document.getElementById('details').style.display = 'block';
        document.getElementById('propertyTitle').innerText = name;
    }

    function goBack() {
        document.getElementById('listings').style.display = 'block';
        document.getElementById('details').style.display = 'none';
    }

    function book() {
        document.getElementById('success').style.display = 'block';
    }
</script>

</body>
</html>
